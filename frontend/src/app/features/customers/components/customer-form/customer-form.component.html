<div class="modal-backdrop" [class.open]="isOpen">
  <div class="modal">
    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="modal-close" (click)="cancel()">×</button>
    </div>

    <div class="modal-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" id="customer-form">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input formControlName="name" type="text" class="form-control"
                   [class.is-invalid]="form.get('name')!.invalid && form.get('name')!.touched"
                   placeholder="e.g. Rajesh Kumar" />
            <div class="form-error" *ngIf="form.get('name')!.invalid && form.get('name')!.touched">Name is required</div>
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input formControlName="email" type="email" class="form-control"
                   [class.is-invalid]="form.get('email')!.invalid && form.get('email')!.touched"
                   placeholder="email@example.com" />
            <div class="form-error" *ngIf="form.get('email')!.invalid && form.get('email')!.touched">Valid email required</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input formControlName="phone" type="text" class="form-control"
                   [class.is-invalid]="form.get('phone')!.invalid && form.get('phone')!.touched"
                   placeholder="9876543210" />
            <div class="form-error" *ngIf="form.get('phone')!.invalid && form.get('phone')!.touched">Phone must be 10 digits</div>
          </div>
          <div class="form-group">
            <label>Meter Number</label>
            <input formControlName="meterNumber" type="text" class="form-control"
                   [class.is-invalid]="form.get('meterNumber')!.invalid && form.get('meterNumber')!.touched"
                   placeholder="MTR-1001" />
            <div class="form-error" *ngIf="form.get('meterNumber')!.invalid && form.get('meterNumber')!.touched">Meter must be MTR-XXXX or numeric</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Account Type</label>
            <select formControlName="accountType" class="form-control">
              <option value="residential">Residential</option>
              <option value="commercial">Commercial</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tariff Plan</label>
            <select formControlName="tariffPlan" class="form-control">
              <option value="standard">Standard</option>
              <option value="premium">Premium</option>
              <option value="commercial">Commercial</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>City</label>
            <input formControlName="city" type="text" class="form-control" placeholder="City" />
          </div>
          <div class="form-group">
            <label>State</label>
            <input formControlName="state" type="text" class="form-control" placeholder="State" />
          </div>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select formControlName="status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn btn-primary" form="customer-form" type="submit" [disabled]="loading">
        <div class="spinner" *ngIf="loading"></div>
        <i class="fas fa-save" *ngIf="!loading"></i>
        {{ loading ? 'Saving...' : 'Save Customer' }}
      </button>
    </div>
  </div>
</div>
